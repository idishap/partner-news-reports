  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Frontify Agency Partner Watch — Jun 24–Jul 1, 2026<\u002Ftitle>\n  <style>\n    /* ─── Frontify brand fonts (Brand Portal 2026) ─── */\n    @font-face {\n      font-family: 'ABC Diatype';\n      src: url(\"7036383d-8f53-4f92-964a-f62b513b88f0\") format('opentype');\n      font-weight: 400; font-style: normal; font-display: swap;\n    }\n    @font-face {\n      font-family: 'Cranny';\n      src: url(\"83af8bc6-fc86-4866-933a-85061a64b47d\") format('opentype');\n      font-weight: 300; font-style: normal; font-display: swap;\n    }\n\n    /* ─── Frontify color system ───\n       Base white #f0f0eb · Base black #111110 · Marker purple #b60ae3 (used sparingly)\n       Base shades and Marker-purple tints per brand essentials. */\n    :root {\n      --base-white: #f0f0eb;   --base-00: #ffffff;   --base-05: #f8f8f5;\n      --base-20: #eaeae4;      --base-25: #e1e1db;   --base-35: #cbcbc5;\n      --base-45: #b2b2ac;      --base-55: #969690;   --base-60: #878781;\n      --base-65: #777772;      --base-70: #676763;   --base-85: #353533;\n      --base-90: #242422;      --base-black: #111110;\n      --mp: #b60ae3;   --mp-70: #880aab;   --mp-80: #650a7f;   --mp-90: #47045c;\n      --mp-15: #fae8ff;  --mp-10: #fcf2ff;\n      --font-body: 'ABC Diatype', 'Helvetica Neue', Helvetica, Arial, sans-serif;\n      --font-display: 'Cranny', Georgia, 'Times New Roman', serif;\n      --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n    }\n\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n    body { font-family: var(--font-body); font-size: 15px; line-height: 1.6; color: var(--base-black); background: var(--base-white); -webkit-font-smoothing: antialiased; }\n    a { color: var(--mp-70); text-decoration: none; }\n    a:hover { color: var(--mp); text-decoration: underline; }\n\n    /* Masthead — report-style header (light, ruled) */\n    .masthead { border-bottom: 1px solid var(--base-black); }\n    .masthead-top { max-width: 1280px; margin: 0 auto; padding: 40px 40px 24px; display: flex; align-items: flex-start; justify-content: space-between; gap: 32px; flex-wrap: wrap; }\n    .masthead-logo img { height: 22px; width: auto; display: block; margin-bottom: 22px; }\n    .masthead-kicker { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--base-70); margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }\n    .masthead-kicker .nook { width: 10px; height: 10px; }\n    .nook { display: inline-block; background: var(--mp); clip-path: polygon(0 0, 100% 0, 100% 100%, 35% 100%, 35% 35%, 0 35%); }\n    .masthead h1 { font-family: var(--font-display); font-size: 40px; font-weight: 300; line-height: 1.05; letter-spacing: -0.025em; max-width: 22ch; text-wrap: balance; color: var(--base-black); }\n    .masthead .issue { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--base-70); text-align: right; line-height: 1.6; white-space: nowrap; }\n    .masthead .issue b { color: var(--base-black); font-weight: 600; }\n\n    /* Snapshot bar */\n    .snapshot { background: var(--base-00); border-bottom: 1px solid var(--base-25); padding: 12px 40px; font-size: 12.5px; color: var(--base-70); display: flex; flex-wrap: wrap; gap: 6px 18px; align-items: center; }\n    .snapshot strong { color: var(--base-black); font-weight: 500; }\n    .snap-zero { color: var(--base-45); }\n\n    /* Layout */\n    .report-body { max-width: 1280px; margin: 0 auto; padding: 40px 40px 80px; }\n\n    /* Category section — stories flow up to 3 across */\n    .cat-section {\n      margin-bottom: 52px;\n      display: grid;\n      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));\n      gap: 16px;\n      align-items: start;\n    }\n    .cat-header,\n    .empty-cat,\n    .events-list,\n    .other-activity-list { grid-column: 1 / -1; }\n    .cat-section > .story-card,\n    .cat-section > .radar-card { margin-bottom: 0; }\n    .cat-header { display: flex; align-items: center; gap: 11px; margin-bottom: 22px; padding-bottom: 11px; border-bottom: 1px solid var(--base-black); }\n    .cat-number { font-size: 11px; font-weight: 500; color: var(--base-65); background: var(--base-20); padding: 3px 9px; border-radius: 10px; letter-spacing: 0.3px; }\n    .cat-header h2 { font-size: 15px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--base-black); }\n\n    /* Category tooltip */\n    .cat-info {\n      position: relative;\n      display: inline-flex;\n      align-items: center;\n      cursor: help;\n      color: var(--base-45);\n      font-size: 14px;\n      line-height: 1;\n    }\n    .cat-info:hover::after {\n      content: attr(data-tip);\n      position: absolute;\n      top: 22px;\n      left: 0;\n      background: var(--base-black);\n      color: var(--base-white);\n      font-size: 12px;\n      font-weight: 400;\n      padding: 9px 13px;\n      border-radius: 6px;\n      max-width: 290px;\n      white-space: normal;\n      z-index: 200;\n      line-height: 1.5;\n      box-shadow: 0 4px 16px rgba(17,17,16,0.22);\n      pointer-events: none;\n    }\n\n    /* Story card */\n    .story-card {\n      background: var(--base-00);\n      border: 1px solid var(--base-25);\n      border-radius: 8px;\n      padding: 22px 26px 18px;\n      margin-bottom: 14px;\n    }\n    .story-meta {\n      font-size: 11.5px;\n      color: var(--base-60);\n      margin-bottom: 9px;\n      display: flex;\n      gap: 10px;\n      flex-wrap: wrap;\n      align-items: center;\n    }\n    .story-partner {\n      font-weight: 500;\n      color: var(--base-black);\n      font-size: 12px;\n      background: var(--base-20);\n      padding: 2px 8px;\n      border-radius: 4px;\n    }\n    .story-card h3 {\n      font-family: var(--font-display);\n      font-size: 22px;\n      font-weight: 300;\n      line-height: 1.24;\n      letter-spacing: -0.2px;\n      margin-bottom: 12px;\n      color: var(--base-black);\n    }\n    .story-card .story-summary {\n      font-size: 14px;\n      color: var(--base-85);\n      line-height: 1.68;\n      margin-bottom: 13px;\n    }\n    .story-card .story-source {\n      font-size: 12px;\n      color: var(--base-60);\n    }\n    .story-card .story-source a { color: var(--base-65); }\n    .story-card .story-source a:hover { color: var(--mp); }\n\n    /* Suggested Outreach accordion — Marker purple (highlight moment) */\n    details.outreach { margin-top: 14px; }\n    details.outreach > summary {\n      cursor: pointer;\n      font-size: 12px;\n      font-weight: 500;\n      color: var(--mp-80);\n      background: var(--mp-10);\n      border: 1px solid var(--mp-15);\n      padding: 8px 12px;\n      border-radius: 5px;\n      list-style: none;\n      display: flex;\n      align-items: center;\n      gap: 7px;\n      user-select: none;\n      transition: background 0.15s;\n    }\n    details.outreach > summary:hover { background: var(--mp-15); }\n    details.outreach > summary::-webkit-details-marker { display: none; }\n    details.outreach > summary::before { content: '▶'; font-size: 8px; color: var(--mp); }\n    details.outreach[open] > summary::before { content: '▼'; }\n    details.outreach[open] > summary { border-radius: 5px 5px 0 0; }\n    .outreach-body {\n      padding: 16px 16px 14px;\n      border: 1px solid var(--mp-15);\n      border-top: none;\n      border-radius: 0 0 5px 5px;\n      background: var(--mp-10);\n      font-size: 13px;\n    }\n    .o-section { margin-bottom: 14px; }\n    .o-section:last-child { margin-bottom: 0; }\n    .o-label {\n      font-size: 10.5px;\n      font-weight: 500;\n      text-transform: uppercase;\n      letter-spacing: 0.9px;\n      color: var(--mp-70);\n      margin-bottom: 7px;\n    }\n    .o-section ul { padding-left: 18px; }\n    .o-section li { margin-bottom: 3px; color: var(--base-85); line-height: 1.5; }\n    .o-note { font-size: 12px; color: var(--base-60); font-style: italic; margin-top: 7px; }\n    .use-cases { display: flex; flex-direction: column; gap: 6px; }\n    .use-case {\n      display: flex;\n      gap: 8px;\n      align-items: flex-start;\n      font-size: 13px;\n      color: var(--base-85);\n      line-height: 1.5;\n    }\n    .uc-pill {\n      display: inline-block;\n      background: var(--mp-15);\n      color: var(--mp-80);\n      font-size: 11px;\n      font-weight: 500;\n      padding: 2px 8px;\n      border-radius: 10px;\n      white-space: nowrap;\n      flex-shrink: 0;\n    }\n    .draft-box {\n      background: var(--base-00);\n      border: 1px solid var(--mp-15);\n      border-radius: 5px;\n      padding: 13px 14px;\n      font-size: 13.5px;\n      line-height: 1.7;\n      color: var(--base-85);\n    }\n    .draft-opener {\n      font-size: 10.5px;\n      font-weight: 500;\n      text-transform: uppercase;\n      letter-spacing: 0.9px;\n      color: var(--mp-70);\n      margin-bottom: 8px;\n    }\n    .draft-opener span { font-weight: 400; color: var(--base-60); letter-spacing: 0; text-transform: none; font-size: 12px; }\n\n    /* Prospect Flag accordion — neutral base (distinct from purple outreach) */\n    details.prospect-flag { margin-top: 14px; }\n    details.prospect-flag > summary {\n      cursor: pointer;\n      font-size: 12px;\n      font-weight: 500;\n      color: var(--base-90);\n      background: var(--base-05);\n      border: 1px solid var(--base-35);\n      padding: 8px 12px;\n      border-radius: 5px;\n      list-style: none;\n      display: flex;\n      align-items: center;\n      gap: 7px;\n      user-select: none;\n      transition: background 0.15s;\n    }\n    details.prospect-flag > summary:hover { background: var(--base-20); }\n    details.prospect-flag > summary::-webkit-details-marker { display: none; }\n    details.prospect-flag > summary::before { content: '▶'; font-size: 8px; color: var(--base-60); }\n    details.prospect-flag[open] > summary::before { content: '▼'; }\n    details.prospect-flag[open] > summary { border-radius: 5px 5px 0 0; }\n    .prospect-body {\n      padding: 16px 16px 14px;\n      border: 1px solid var(--base-35);\n      border-top: none;\n      border-radius: 0 0 5px 5px;\n      background: var(--base-05);\n      font-size: 13px;\n    }\n    .p-label {\n      font-size: 10.5px;\n      font-weight: 500;\n      text-transform: uppercase;\n      letter-spacing: 0.9px;\n      color: var(--base-65);\n      margin-bottom: 7px;\n    }\n    .p-section { margin-bottom: 13px; }\n    .p-section:last-child { margin-bottom: 0; }\n    .p-section p { color: var(--base-85); line-height: 1.6; }\n\n    /* Empty category placeholder — thin line on blank canvas */\n    .empty-cat {\n      background: var(--base-05);\n      border: 1px dashed var(--base-35);\n      border-radius: 7px;\n      padding: 16px 20px;\n      color: var(--base-60);\n      font-size: 13px;\n      font-style: italic;\n    }\n\n    /* Industry Radar */\n    .radar-card {\n      background: var(--base-00);\n      border: 1px solid var(--base-25);\n      border-radius: 8px;\n      padding: 22px 26px 18px;\n      margin-bottom: 14px;\n    }\n    .radar-card .radar-meta {\n      font-size: 11.5px;\n      color: var(--base-60);\n      margin-bottom: 8px;\n    }\n    .radar-card h4 {\n      font-family: var(--font-display);\n      font-size: 20px;\n      font-weight: 300;\n      color: var(--base-black);\n      margin-bottom: 5px;\n      line-height: 1.26;\n      letter-spacing: -0.2px;\n    }\n    .radar-card .radar-source-line { font-size: 12px; color: var(--base-60); margin-bottom: 12px; }\n    .radar-card .radar-source-line a { color: var(--base-65); }\n    .radar-summary { font-size: 14px; color: var(--base-85); line-height: 1.68; margin-bottom: 12px; }\n    .why-matters {\n      background: var(--mp-10);\n      border-left: 3px solid var(--mp);\n      padding: 11px 15px;\n      border-radius: 0 5px 5px 0;\n      font-size: 13px;\n      color: var(--base-85);\n      line-height: 1.6;\n    }\n    .why-matters strong { color: var(--mp-80); }\n\n    /* Events list */\n    .events-list { list-style: none; padding: 0; }\n    .events-list li {\n      padding: 12px 2px;\n      border-bottom: 1px solid var(--base-25);\n      font-size: 14px;\n      color: var(--base-85);\n      line-height: 1.5;\n    }\n    .events-list li:last-child { border-bottom: none; }\n    .ev-person { font-weight: 500; color: var(--base-black); }\n    .ev-sep { color: var(--base-40, #bfbfb8); margin: 0 6px; }\n\n    /* Other Activity compact list */\n    .other-activity-list { list-style: none; padding: 0; }\n    .other-activity-list li {\n      padding: 11px 14px;\n      background: var(--base-00);\n      border: 1px solid var(--base-25);\n      border-radius: 6px;\n      font-size: 13.5px;\n      color: var(--base-85);\n      line-height: 1.55;\n      margin-bottom: 8px;\n    }\n    .oa-partner { font-weight: 500; color: var(--base-black); margin-right: 6px; }\n    .oa-cat { font-size: 11px; color: var(--base-65); background: var(--base-20); padding: 1px 7px; border-radius: 10px; margin-right: 6px; vertical-align: middle; }\n    .oa-unresolvable { font-size: 11.5px; color: var(--base-55); font-style: italic; margin-left: 4px; }\n\n    /* Coverage appendix */\n    .coverage-appendix { margin-top: 60px; padding-top: 22px; border-top: 1px solid var(--base-35); }\n    .coverage-appendix > h2 {\n      font-size: 11.5px;\n      font-weight: 500;\n      text-transform: uppercase;\n      letter-spacing: 1.2px;\n      color: var(--base-60);\n      margin-bottom: 18px;\n    }\n    .coverage-grid {\n      display: grid;\n      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));\n      gap: 7px;\n    }\n    .cov-item {\n      font-size: 12.5px;\n      padding: 10px 12px;\n      border-radius: 6px;\n    }\n    .cov-item.featured { background: var(--mp-10); border: 1px solid var(--mp-15); }\n    .cov-item.other { background: var(--base-05); border: 1px solid var(--base-25); }\n    .cov-item.none { background: var(--base-05); border: 1px solid var(--base-20); }\n    .cov-name { font-weight: 500; display: block; color: var(--base-black); }\n    .cov-item.none .cov-name { color: var(--base-60); font-weight: 500; }\n    .cov-item.other .cov-name { color: var(--base-90); }\n    .cov-status { font-size: 11px; color: var(--base-65); display: block; margin-top: 2px; }\n    .cov-item.featured .cov-status { color: var(--mp-70); }\n    .cov-item.other .cov-status { color: var(--base-65); }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ═══ MASTHEAD ═══ -->\n<header class=\"masthead\">\n  <div class=\"masthead-top\">\n    <div>\n      <div class=\"masthead-logo\"><img src=\"1ac95bf5-5c47-4ce4-9eb2-800164be42a4\" alt=\"Frontify\"><\u002Fdiv>\n      <div class=\"masthead-kicker\"><span class=\"nook\"><\u002Fspan> Weekly intelligence for Frontify partner managers<\u002Fdiv>\n      <h1>Frontify Agency Partner Watch — Jun 24–Jul 1, 2026<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"issue\"><b>Partnerships<\u002Fb><br>Internal Weekly<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ═══ SNAPSHOT ═══ -->\n<div class=\"snapshot\">\n  <span><strong>AI &amp; Brand Intelligence:<\u002Fstrong> 2<\u002Fspan>\n  <span><strong>Brand &amp; Identity:<\u002Fstrong> 4<\u002Fspan>\n  <span><strong>New Business:<\u002Fstrong> <span class=\"snap-zero\">—<\u002Fspan><\u002Fspan>\n  <span><strong>Pitches:<\u002Fstrong> <span class=\"snap-zero\">—<\u002Fspan><\u002Fspan>\n  <span><strong>People &amp; Hires:<\u002Fstrong> <span class=\"snap-zero\">—<\u002Fspan><\u002Fspan>\n  <span><strong>Launches:<\u002Fstrong> <span class=\"snap-zero\">—<\u002Fspan><\u002Fspan>\n  <span><strong>Competitor Watch:<\u002Fstrong> <span class=\"snap-zero\">—<\u002Fspan><\u002Fspan>\n  <span><strong>Industry Radar:<\u002Fstrong> 2<\u002Fspan>\n  <span><strong>Events &amp; Attendance:<\u002Fstrong> 14<\u002Fspan>\n<\u002Fdiv>\n\n<div class=\"report-body\">\n\n  <!-- ═══ 01 · AI & BRAND INTELLIGENCE ═══ -->\n  <section class=\"cat-section\">\n    <div class=\"cat-header\">\n      <span class=\"cat-number\">01<\u002Fspan>\n      <h2>AI &amp; Brand Intelligence<\u002Fh2>\n      <span class=\"cat-info\" data-tip=\"Partner activity around AI brand compliance, machine-readable brand guidelines, LLM-ready design systems, and AI-in-brand workflows.\">ⓘ<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- VIM Group — Agentic Lovemarks Part 2 -->\n    <div class=\"story-card\">\n      <div class=\"story-meta\">\n        <span class=\"story-partner\">VIM Group<\u002Fspan>\n        <span>25 Jun 2026<\u002Fspan>\n        <span>Brandingmag<\u002Fspan>\n      <\u002Fdiv>\n      <h3>VIM Group: Emotional Brand Equity Becomes a Selection Filter as AI Mediates Choice<\u002Fh3>\n      <p class=\"story-summary\">VIM Group Client Partner Arjan Kapteijns published Part 2 of his \"Agentic Lovemarks\" series on Brandingmag, developing the argument that in an AI-mediated world, emotional brand distinctiveness is not just a communications asset but a prerequisite for inclusion in AI-generated shortlists. The piece introduces the \"Brand Constitution\" concept — a machine-readable governing document that encodes brand identity, values, and behavioral boundaries so AI agents can execute on-brand without human interpretation of a static guidelines document. Kapteijns argues the correct sequence is: define meaning first, then encode behavior into the Brand Constitution, then optimize for AI legibility — and that organizations which skip to GEO/AEO optimization without this foundation will become efficiently visible but interchangeable.<\u002Fp>\n      <p class=\"story-source\">Source: <a href=\"https://www.brandingmag.com/arjan-kapteijns/agentic-lovemarks-why-emotional-brands-matter-more-when-ai-selects/\" target=\"_blank\">Brandingmag, 25 Jun 2026<\u002Fa> &nbsp;·&nbsp; <a href=\"https://www.linkedin.com/feed/update/urn:li:activity:7477626967131947008/\" target=\"_blank\">LinkedIn post<\u002Fa><\u002Fp>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <div class=\"o-section\">\n            <div class=\"o-label\">Named Contacts<\u002Fdiv>\n            <ul>\n              <li>Arjan Kapteijns — Client Partner, VIM Group<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"o-section\">\n            <div class=\"o-label\">Frontify Use Cases<\u002Fdiv>\n            <div class=\"use-cases\">\n              <div class=\"use-case\"><span class=\"uc-pill\">AI brand<\u002Fspan><span>Machine-readable brand guidelines as the technical layer beneath the Brand Constitution Kapteijns describes — enabling AI agents to query and act on brand standards without human interpretation of a static document<\u002Fspan><\u002Fdiv>\n              <div class=\"use-case\"><span class=\"uc-pill\">Brand portal<\u002Fspan><span>Structured, single-source brand guidelines as the encoded behavioral system that must exist before any AI legibility optimization makes sense<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"o-section\">\n            <div class=\"draft-box\">\n              <div class=\"draft-opener\">LinkedIn Message &nbsp;<span>· Opening line<\u002Fspan><\u002Fdiv>\n              <p><em>The Agentic Lovemarks series — the Brand Constitution framing is exactly where this is heading.<\u002Fem><\u002Fp>\n              <br>\n              <p>Hi Arjan — the argument that meaning must precede AI legibility optimization, and that the Brand Constitution is the encoding layer between human brand strategy and machine execution, maps closely onto what we're building at Frontify. We're making brand guidelines machine-readable so AI agents can query standards directly — the technical layer beneath the concept you describe. Given VIM Group's brand transformation practice, I'm curious whether clients are arriving at this framing explicitly or whether you're leading the conversation. Happy to share what we're seeing. [Your name]<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <!-- Mutabor — Brand IQ Finance 2026 -->\n    <div class=\"story-card\">\n      <div class=\"story-meta\">\n        <span class=\"story-partner\">Mutabor<\u002Fspan>\n        <span>24 Jun 2026<\u002Fspan>\n        <span>brandiq-studie.de<\u002Fspan>\n      <\u002Fdiv>\n      <h3>Mutabor's Brand IQ Finance 2026 Adds AI Readiness &amp; GEO Dimension to Annual Study<\u002Fh3>\n      <p class=\"story-summary\">Mutabor published its annual Brand IQ Finance study, ranking 15 major German financial brands across five dimensions: Strategy, Design, Communication, Innovation, and — new this year — AI Readiness &amp; GEO. The new dimension measures how prepared brands are for LLM-based discovery and AI-mediated recommendation, reflecting a structural shift in how brands in financial services need to think about visibility and consistency in an agentic environment. The study provides concrete benchmarking data on which German financial brands are structurally ready for AI-era brand management and which are not.<\u002Fp>\n      <p class=\"story-source\">Source: <a href=\"https://www.brandiq-studie.de/finance\" target=\"_blank\">Brand IQ Finance 2026, Mutabor<\u002Fa> &nbsp;·&nbsp; <a href=\"https://www.linkedin.com/feed/update/urn:li:activity:7477362699971006464/\" target=\"_blank\">LinkedIn post<\u002Fa><\u002Fp>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <div class=\"o-section\">\n            <div class=\"o-label\">Named Contacts<\u002Fdiv>\n            <p class=\"o-note\">No named contacts in source — address to Mutabor partnerships or strategy team.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"o-section\">\n            <div class=\"o-label\">Frontify Use Cases<\u002Fdiv>\n            <div class=\"use-cases\">\n              <div class=\"use-case\"><span class=\"uc-pill\">AI brand<\u002Fspan><span>Machine-readable brand guidelines as the infrastructure layer that determines AI Readiness &amp; GEO performance — the dimension Mutabor is now measuring across German financial brands<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"o-section\">\n            <div class=\"draft-box\">\n              <div class=\"draft-opener\">Email &nbsp;<span>· Subject<\u002Fspan><\u002Fdiv>\n              <p><em>Brand IQ Finance 2026 — the AI Readiness dimension caught our attention<\u002Fem><\u002Fp>\n              <br>\n              <p>Hi [Mutabor team] — the Brand IQ Finance study is genuinely useful work, and the introduction of an AI Readiness &amp; GEO dimension this year marks a real shift in what you're measuring. That question — how ready are financial brands for LLM-based discovery — maps directly onto infrastructure we're building at Frontify: making brand guidelines machine-readable so AI agents can query standards during generation. We'd be curious to hear what separates the top performers on that dimension. Happy to share what we're seeing from the brand side. [Your name]<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ═══ 02 · BRAND & IDENTITY WORK ═══ -->\n  <section class=\"cat-section\">\n    <div class=\"cat-header\">\n      <span class=\"cat-number\">02<\u002Fspan>\n      <h2>Brand &amp; Identity Work<\u002Fh2>\n      <span class=\"cat-info\" data-tip=\"New identities, rebrands, visual systems, logo work, and brand guidelines projects delivered by partners.\">ⓘ<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Kontrapunkt — AESC -->\n    <div class=\"story-card\">\n      <div class=\"story-meta\">\n        <span class=\"story-partner\">Kontrapunkt<\u002Fspan>\n        <span>27 Jun 2026<\u002Fspan>\n      <\u002Fdiv>\n      <h3>Kontrapunkt and Kenya Hara Build \"Advancing Beyond\" Brand System for Battery Alliance AESC<\u002Fh3>\n      <p class=\"story-summary\">Kontrapunkt has published a new brand identity for AESC, the global battery manufacturer and clean energy alliance, in collaboration with Kenya Hara and Nippon Design Center. The work — developed around the strategic direction \"Advancing Beyond\" — includes a new logotype, an \"A Mark\" symbol, a bespoke brand typeface, and a comprehensive digital-first visual system. The collaboration between a Copenhagen-based brand consultancy and one of Japan's most respected designers produced a system designed for global deployment across digital, physical, and manufacturing environments.<\u002Fp>\n      <p class=\"story-source\">Source: <a href=\"https://kontrapunkt.com/work/aesc\" target=\"_blank\">Kontrapunkt.com — AESC case study<\u002Fa> &nbsp;·&nbsp; <a href=\"https://www.linkedin.com/feed/update/urn:li:activity:7477647896574877696/\" target=\"_blank\">LinkedIn post<\u002Fa><\u002Fp>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <div class=\"o-section\">\n            <div class=\"o-label\">Named Contacts<\u002Fdiv>\n            <ul>\n              <li>Philip Linnemann — Executive Creative Director &amp; Partner, Kontrapunkt<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"o-section\">\n            <div class=\"o-label\">Frontify Use Cases<\u002Fdiv>\n            <div class=\"use-cases\">\n              <div class=\"use-case\"><span class=\"uc-pill\">Brand portal<\u002Fspan><span>A digital-first global brand system of this complexity — new logotype, A Mark, bespoke typeface — needs a structured, managed home for the brand post-delivery to keep precision consistent as it reaches manufacturing and communications teams worldwide<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"o-section\">\n            <div class=\"draft-box\">\n              <div class=\"draft-opener\">LinkedIn Message &nbsp;<span>· Opening line<\u002Fspan><\u002Fdiv>\n              <p><em>The AESC \"Advancing Beyond\" identity — the collaboration with Kenya Hara is a rare pairing.<\u002Fem><\u002Fp>\n              <br>\n              <p>Hi Philip — the AESC system is impressive work. A digital-first identity at this level of complexity — new logotype, A Mark, bespoke typeface across global manufacturing and communications environments — needs an equally considered home for the brand post-delivery. That's where Frontify tends to come in: a structured brand portal that keeps a system this precise accessible and consistent as it reaches teams across markets. Curious how Kontrapunkt approaches the brand governance stage for projects like this. [Your name]<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <!-- Pentagram — Dataland -->\n    <div class=\"story-card\">\n      <div class=\"story-meta\">\n        <span class=\"story-partner\">Pentagram<\u002Fspan>\n        <span>30 Jun 2026<\u002Fspan>\n      <\u002Fdiv>\n      <h3>Pentagram Creates Brand Identity for Refik Anadol's Dataland — an AI Art Institution Opening in Los Angeles<\u002Fh3>\n      <p class=\"story-summary\">Pentagram has published the brand identity for Dataland, the AI art institution founded by artist Refik Anadol and set to open in Los Angeles. The project — designing the brand language for a new institution whose practice is itself built on machine learning and generative AI — required Pentagram to develop a visual system that could hold both the technical and the aesthetic dimensions of Anadol's work. Dataland positions itself as the world's first museum dedicated to AI art, making this one of the few identity briefs where the brand's subject matter and the studio's craft converge on artificial intelligence as both medium and message.<\u002Fp>\n      <p class=\"story-source\">Source: <a href=\"https://www.pentagram.com/work/dataland\" target=\"_blank\">Pentagram.com — Dataland case study<\u002Fa><\u002Fp>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <div class=\"o-section\">\n            <div class=\"o-label\">Named Contacts<\u002Fdiv>\n            <p class=\"o-note\">No named contacts in source — address to Pentagram partnerships team.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"o-section\">\n            <div class=\"o-label\">Frontify Use Cases<\u002Fdiv>\n            <div class=\"use-cases\">\n              <div class=\"use-case\"><span class=\"uc-pill\">Brand portal<\u002Fspan><span>An institution built around generative AI as its core medium is a natural fit for a machine-readable brand home — Frontify's brand portal provides structured guidelines that the institution's own AI workflows can reference consistently<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"o-section\">\n            <div class=\"draft-box\">\n              <div class=\"draft-opener\">LinkedIn Message &nbsp;<span>· Opening line<\u002Fspan><\u002Fdiv>\n              <p><em>The Dataland identity — building a brand language for an AI art institution is an unusual brief.<\u002Fem><\u002Fp>\n              <br>\n              <p>Hi [Pentagram team] — the Dataland identity is a genuinely rare project: designing the brand for an institution whose practice is built on machine learning, at the moment when AI art is being institutionalised for the first time. At Frontify, we work with institutions and the agencies that design their visual systems to create a structured, living home for the brand as it scales. Would be interested to hear how Pentagram thinks about the handover and governance stage for complex new identities like Dataland. [Your name]<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <!-- Peter Schmidt Group — AUMOVIO -->\n    <div class=\"story-card\">\n      <div class=\"story-meta\">\n        <span class=\"story-partner\">Peter Schmidt Group<\u002Fspan>\n        <span>27 Jun 2026<\u002Fspan>\n        <span>German Brand Award<\u002Fspan>\n      <\u002Fdiv>\n      <h3>Peter Schmidt Group Wins German Brand Award \"Best of Best\" for AUMOVIO Identity<\u002Fh3>\n      <p class=\"story-summary\">Peter Schmidt Group has received the German Brand Award \"Best of Best\" — the award's top distinction — for its identity work for AUMOVIO. The German Brand Award, presented by the German Design Council, is Germany's leading recognition for brand strategy and brand management excellence. A \"Best of Best\" designation places the AUMOVIO project among the most strategically and visually accomplished brand work in the German market this year.<\u002Fp>\n      <p class=\"story-source\">Source: <a href=\"https://www.linkedin.com/feed/update/urn:li:activity:7477666757181267970/\" target=\"_blank\">Peter Schmidt Group, LinkedIn, 27 Jun 2026<\u002Fa><\u002Fp>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <div class=\"o-section\">\n            <div class=\"o-label\">Named Contacts<\u002Fdiv>\n            <p class=\"o-note\">No named contacts in source — address to Peter Schmidt Group partnerships team.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"o-section\">\n            <div class=\"o-label\">Frontify Use Cases<\u002Fdiv>\n            <div class=\"use-cases\">\n              <div class=\"use-case\"><span class=\"uc-pill\">Brand portal<\u002Fspan><span>Award-winning brand work at this level of recognition deserves infrastructure that protects the system post-delivery — a structured brand guidelines home that travels with the identity as it scales across AUMOVIO's touchpoints<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"o-section\">\n            <div class=\"draft-box\">\n              <div class=\"draft-opener\">LinkedIn Message &nbsp;<span>· Opening line<\u002Fspan><\u002Fdiv>\n              <p><em>Congratulations on AUMOVIO — Best of Best at the German Brand Award is well earned.<\u002Fem><\u002Fp>\n              <br>\n              <p>Hi [Peter Schmidt Group team] — recognition at that level from the German Design Council reflects both the quality of the work and its commercial impact. We work with German agencies and their clients on the infrastructure that protects award-winning identity work after delivery — brand portals and digital brand systems that keep precise visual identities consistent as they scale internally and externally. Would be happy to share how we're approaching this in the German market. [Your name]<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <!-- Kurppa Hosk — Scania -->\n    <div class=\"story-card\">\n      <div class=\"story-meta\">\n        <span class=\"story-partner\">Kurppa Hosk<\u002Fspan>\n        <span>Jun 2026<\u002Fspan>\n      <\u002Fdiv>\n      <h3>Kurppa Hosk Publishes Scania Brand Transformation Case Study — Seven Years of Brand Strategy, Experience, and Governance<\u002Fh3>\n      <p class=\"story-summary\">Kurppa Hosk has published a comprehensive case study of its ongoing brand partnership with Scania, the Swedish truck and transport manufacturer. The work — spanning brand strategy, experience design, digital systems, brand governance, and internal culture — covers a seven-year relationship that has touched every layer of how Scania presents itself globally. The case study highlights brand governance as a discrete and integral workstream, not an afterthought, in managing a global industrial brand at the scale and complexity of Scania's operations.<\u002Fp>\n      <p class=\"story-source\">Source: <a href=\"https://www.kurppahosk.com/work/scania\" target=\"_blank\">Kurppahosk.com — Scania case study<\u002Fa><\u002Fp>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <div class=\"o-section\">\n            <div class=\"o-label\">Named Contacts<\u002Fdiv>\n            <p class=\"o-note\">No named contacts in source — address to Kurppa Hosk partnerships team.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"o-section\">\n            <div class=\"o-label\">Frontify Use Cases<\u002Fdiv>\n            <div class=\"use-cases\">\n              <div class=\"use-case\"><span class=\"uc-pill\">Brand portal<\u002Fspan><span>Brand governance as a core workstream — explicit in the Scania partnership — is precisely what Frontify's brand portal infrastructure is designed to support at multi-market industrial scale<\u002Fspan><\u002Fdiv>\n              <div class=\"use-case\"><span class=\"uc-pill\">DAM<\u002Fspan><span>Seven years of evolving brand assets across strategy, experience design, and digital systems for a global manufacturer requires structured asset governance to stay coherent across markets and touchpoints<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"o-section\">\n            <div class=\"draft-box\">\n              <div class=\"draft-opener\">LinkedIn Message &nbsp;<span>· Opening line<\u002Fspan><\u002Fdiv>\n              <p><em>The Scania case study — seven years of brand partnership is a compelling demonstration.<\u002Fem><\u002Fp>\n              <br>\n              <p>Hi [Kurppa Hosk team] — a seven-year brand transformation covering strategy, experience design, digital systems, and brand governance is a significant body of work. The governance dimension is one we spend a lot of time on at Frontify — particularly how complex multi-market industrial brands keep their brand systems consistent and accessible as they evolve. Curious how the governance workstream has developed over the Scania engagement, and whether that's becoming a more prominent part of how Kurppa Hosk structures long-term brand partnerships. [Your name]<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ═══ 03 · NEW BUSINESS ═══ -->\n  <section class=\"cat-section\">\n    <div class=\"cat-header\">\n      <span class=\"cat-number\">03<\u002Fspan>\n      <h2>New Business<\u002Fh2>\n      <span class=\"cat-info\" data-tip=\"Confirmed client wins by partner agencies.\">ⓘ<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"empty-cat\">No confirmed new business wins surfaced this week.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ 04 · PITCHES ═══ -->\n  <section class=\"cat-section\">\n    <div class=\"cat-header\">\n      <span class=\"cat-number\">04<\u002Fspan>\n      <h2>Pitches<\u002Fh2>\n      <span class=\"cat-info\" data-tip=\"Pitch activity — won, lost, shortlisted, or in progress — for clients with 1,000+ employees.\">ⓘ<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"empty-cat\">No qualifying pitch activity surfaced this week.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ 05 · PEOPLE & HIRES ═══ -->\n  <section class=\"cat-section\">\n    <div class=\"cat-header\">\n      <span class=\"cat-number\">05<\u002Fspan>\n      <h2>People &amp; Hires<\u002Fh2>\n      <span class=\"cat-info\" data-tip=\"Senior hires at partner agencies relevant to Frontify conversations: brand systems, design ops, DAM, brand tech, AI + brand, or senior creative/strategic leadership.\">ⓘ<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"empty-cat\">No qualifying senior hires surfaced this week.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ 06 · LAUNCHES & CAPABILITIES ═══ -->\n  <section class=\"cat-section\">\n    <div class=\"cat-header\">\n      <span class=\"cat-number\">06<\u002Fspan>\n      <h2>Launches &amp; Capabilities<\u002Fh2>\n      <span class=\"cat-info\" data-tip=\"New agency products, tools, service lines, or partnerships announced by partners.\">ⓘ<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"empty-cat\">No qualifying launches or new capabilities surfaced this week.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ 07 · COMPETITOR WATCH ═══ -->\n  <section class=\"cat-section\">\n    <div class=\"cat-header\">\n      <span class=\"cat-number\">07<\u002Fspan>\n      <h2>Competitor Watch<\u002Fh2>\n      <span class=\"cat-info\" data-tip=\"Partner activity involving Frontify competitors — adoption, integration work, recommendation, or public endorsement.\">ⓘ<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"empty-cat\">No competitor signals involving partner agencies surfaced this week.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ 09 · INDUSTRY RADAR ═══ (rendered before Events per placement guidance) -->\n  <section class=\"cat-section\">\n    <div class=\"cat-header\">\n      <span class=\"cat-number\">09<\u002Fspan>\n      <h2>Industry Radar<\u002Fh2>\n      <span class=\"cat-info\" data-tip=\"Significant industry developments in brand guidelines, machine-readable brand standards, and AI brand compliance — no partner agency required.\">ⓘ<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Syzygy RAIIN — industry story -->\n    <div class=\"radar-card\">\n      <div class=\"radar-meta\">Industry story &nbsp;·&nbsp; 24 Jun 2026 &nbsp;·&nbsp; Horizont<\u002Fdiv>\n      <h4>Syzygy Launches RAIIN — an AI Tool for Generating Brand-Compliant Images<\u002Fh4>\n      <div class=\"radar-source-line\"><a href=\"https://www.horizont.net/tech/nachrichten/markenkonforme-bildwelten-raiinmit-diesem-ki-tool-will-syzygy-den-markt-ueberzeugen-234832\" target=\"_blank\">Horizont, 24 Jun 2026<\u002Fa><\u002Fdiv>\n      <p class=\"radar-summary\">Syzygy, a WPP digital agency, has launched RAIIN — an AI image generation tool built around brand compliance as a core constraint. The tool takes brand guidelines as structured input and generates visuals that conform to those standards, positioning itself as a solution to the brand consistency failures that emerge from generic generative AI tools operating without a brand framework. RAIIN represents an early commercial product in what is becoming a distinct category: brand-aware AI image generation where the brand layer actively governs output rather than being applied retrospectively.<\u002Fp>\n      <div class=\"why-matters\"><strong>Why it matters for Frontify:<\u002Fstrong> RAIIN illustrates the market direction Frontify's AI brand and Brand Graph work anticipates: brand-compliant AI generation requires a machine-readable brand layer upstream. Tools like RAIIN succeed or fail based on the quality and structure of the brand data they ingest. Frontify's position as the home of brand guidelines puts it at exactly this upstream point — the question of who provides the brand input that governs AI image generation is an open competitive question.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Wolff Ollins — Winston Taylor rebrand (prospect flag) -->\n    <div class=\"radar-card\">\n      <div class=\"radar-meta\">Prospect agency &nbsp;·&nbsp; Jun 2026 &nbsp;·&nbsp; LinkedIn<\u002Fdiv>\n      <h4>Wolff Ollins Creates Full Brand Framework for Winston Taylor — New Law Firm Formed from Winston &amp; Strawn / Taylor Wessing Merger<\u002Fh4>\n      <div class=\"radar-source-line\">Source: <a href=\"https://www.linkedin.com/company/wolff-olins/posts/?feedView=all\" target=\"_blank\">Wolff Ollins LinkedIn (company page)<\u002Fa><\u002Fdiv>\n      <p class=\"radar-summary\">Wolff Ollins has published work for Winston Taylor, a new international law firm created from the merger of Winston &amp; Strawn and Taylor Wessing. The project spans brand strategy, visual identity, naming, and website — a full brand framework built from scratch for a newly combined entity operating across multiple legal markets. The work demonstrates Wolff Ollins's continued positioning in high-stakes brand creation for professional services firms navigating major structural change.<\u002Fp>\n      <div class=\"why-matters\"><strong>Why it matters for Frontify:<\u002Fstrong> Wolff Ollins is one of the most respected brand consultancies in the world and operates at the complex end of brand system creation — exactly Frontify's territory. They are not currently a partner.<\u002Fdiv>\n      <details class=\"prospect-flag\">\n        <summary>Prospect Flag — Wolff Ollins<\u002Fsummary>\n        <div class=\"prospect-body\">\n          <div class=\"p-section\">\n            <div class=\"p-label\">Agency<\u002Fdiv>\n            <p>Wolff Ollins — global brand consultancy headquartered in London and New York. Known for transformational identity work at the highest level of strategic complexity (past clients include GE, Tata, Transport for London, Met). Not currently a Frontify partner.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"p-section\">\n            <div class=\"p-label\">Why This Is a Relevant Frontify Conversation<\u002Fdiv>\n            <p>Wolff Ollins consistently delivers exactly the kind of complex, system-level brand work — brand strategy, visual identity, digital systems, naming — where Frontify's brand portal and DAM infrastructure would be most valuable post-delivery. The Winston Taylor project (merger brand, full framework, new website) is a textbook case for a structured brand guidelines home. Their client base is enterprise and professional services — strong alignment with Frontify's ICP.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"p-section\">\n            <div class=\"p-label\">Suggested First Contact<\u002Fdiv>\n            <p>Reach out to Wolff Ollins's partnerships or strategy leadership with reference to the Winston Taylor or another recent case study. Frame Frontify as the structured brand infrastructure layer that protects and activates the work they create — the brand portal and guidelines system that travels post-delivery. Given their scale and client complexity, the DAM conversation may resonate equally.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ═══ OTHER ACTIVITY ═══ -->\n  <section class=\"cat-section\">\n    <div class=\"cat-header\">\n      <span class=\"cat-number\" style=\"background:#f5f0e8; color:#bbb;\">—<\u002Fspan>\n      <h2 style=\"color:#888; font-size:14px;\">Other Activity<\u002Fh2>\n      <span class=\"cat-info\" data-tip=\"Qualifying but lower-priority items that didn't make the featured story cut this week.\">ⓘ<\u002Fspan>\n    <\u002Fdiv>\n    <ul class=\"other-activity-list\">\n      <li>\n        <span class=\"oa-partner\">Sherpa Design<\u002Fspan>\n        <span class=\"oa-cat\">Brand &amp; Identity<\u002Fspan>\n        Shared brand identity work for Lufthansa Cargo — a new visual evolution of the cargo carrier's brand system. Signal is genuine but detail was limited in the LinkedIn post.\n        <a href=\"https://www.linkedin.com/feed/update/urn:li:activity:7477611092085657601/\" target=\"_blank\" style=\"font-size:12px; color:#6b7280;\">Source<\u002Fa>\n      <\u002Fli>\n      <li>\n        <span class=\"oa-partner\">Sid Lee<\u002Fspan>\n        <span class=\"oa-cat\">New Business<\u002Fspan>\n        Reported to have won Eintracht Frankfurt as a client — a German Bundesliga football club (qualifying scale). Signal confirmed via research but source URL unresolvable.\n        <span class=\"oa-unresolvable\">(URL unresolvable)<\u002Fspan>\n      <\u002Fli>\n      <li>\n        <span class=\"oa-partner\">Stockholm Design Lab<\u002Fspan>\n        <span class=\"oa-cat\">Brand &amp; Identity<\
