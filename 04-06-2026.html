  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

}\n<\u002Fstyle>\n<style>\n/* =========================================================================\n   FRONTIFY / FONDUE — colors & type foundation\n   Sourced from github.com/Frontify/fondue-tokens\n   ========================================================================= */\n@font-face { font-family: \"ABC Diatype\"; src: url(\"ffabed5a-d03e-42e8-80e1-fee7859b2446\") format(\"opentype\"); font-weight: 300; font-style: normal; font-display: swap; }\n@font-face { font-family: \"ABC Diatype\"; src: url(\"b0a6258c-6623-4e53-950d-7ea191d24b61\") format(\"opentype\"); font-weight: 400; font-style: normal; font-display: swap; }\n@font-face { font-family: \"ABC Diatype\"; src: url(\"c2b8fb5f-d285-4e91-82e2-8c89d98f3488\") format(\"opentype\"); font-weight: 500; font-style: normal; font-display: swap; }\n@font-face { font-family: \"ABC Diatype\"; src: url(\"4c4f4d86-c495-47f6-bc81-200c4222222d\") format(\"opentype\"); font-weight: 700; font-style: normal; font-display: swap; }\n\n:root {\n  /* Brand foundations */\n  --base-white:    #F0F0EB;\n  --base-black:    #111110;\n  --marker-purple: #B60AE3;\n\n  /* Base — grey scale */\n  --base-00: #FFFFFF;\n  --base-05: #F8F8F5;\n  --base-20: #EAEAE4;\n  --base-25: #E1E1DB;\n  --base-35: #CBCBC5;\n  --base-40: #BFBFB8;\n  --base-50: #A4A49E;\n  --base-60: #878781;\n  --base-65: #777772;\n  --base-70: #676763;\n  --base-80: #464643;\n  --base-85: #353533;\n  --base-90: #242422;\n\n  --grey-0:#FFFFFF; --grey-40:#A4A49E; --grey-45:#969690; --grey-50:#878781; --grey-55:#7d7d78;\n  --grey-60:#777772; --grey-65:#6b6b66; --grey-70:#464643; --grey-80:#353533; --grey-90:#242422;\n\n  /* Marker Purple — accent */\n  --mp-10:#FCF2FF; --mp-15:#FAE8FF; --mp-20:#F5CCFF; --mp-30:#ECA1FE; --mp-40:#E06BFD;\n  --mp-50:#D230FA; --mp-70:#880AAB; --mp-80:#650A7F; --mp-90:#47045C;\n\n  /* Semantic colors */\n  --success-green-30:#A5EB99; --success-green-60:#168500; --success-green-70:#0f6b00;\n  --error-red-30:#F9B1AE; --error-red-60:#DE2417; --error-red-70:#c41f13;\n  --yellow-10:#FCF2E0; --yellow-20:#FDEBC7; --yellow-30:#FDDD95; --yellow-60:#FFB400; --yellow-80:#966A00;\n\n  --text-color:#353533; --text-color-weak:#777772; --text-color-interactive:#880AAB; --text-color-interactive-hover:#47045C;\n\n  --line-color: rgba(8,8,8,0.10);\n  --line-color-weak: rgba(8,8,8,0.05);\n  --line-color-strong: rgba(8,8,8,0.15);\n  --line-color-x-strong: rgba(8,8,8,0.30);\n\n  --shadow: 0 3px 10px 0 rgba(8,8,8,0.06);\n\n  --font-body: \"ABC Diatype\", \"Space Grotesk\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif;\n  --font-display: \"Cranny\", \"Newsreader\", \"Source Serif 4\", Georgia, serif;\n  --font-mono: \"Menlo\", ui-monospace, \"SF Mono\", Consolas, monospace;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: 14px;\n  line-height: 1.5;\n  color: var(--grey-80);\n  background: var(--base-05);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n  font-feature-settings: \"ss01\",\"ss02\";\n}\n\n/* ===== TOPBAR ============================================================ */\n.page { max-width: 1080px; margin: 0 auto; padding: 28px 40px 80px; }\n.topbar {\n  display: flex; align-items: center; justify-content: space-between;\n  padding-bottom: 18px; border-bottom: 1px solid var(--line-color); margin-bottom: 34px;\n}\n.brand { display: flex; align-items: center; gap: 14px; }\n.brand .mark { display: block; }\n.brand .wordmark { font-size: 18px; font-weight: 500; letter-spacing: -0.01em; color: var(--grey-90); }\n.brand .div { width: 1px; height: 22px; background: var(--line-color-strong); }\n.brand .ci { font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--grey-60); font-weight: 500; }\n.topbar .meta { display: flex; gap: 22px; align-items: center; font-size: 12px; color: var(--grey-60); }\n.topbar .meta b { color: var(--grey-90); font-weight: 500; }\n\n/* ===== HERO ============================================================== */\n.hero { display: grid; grid-template-columns: 1.5fr 1fr; gap: 48px; padding: 6px 0 36px; border-bottom: 1px solid var(--line-color); margin-bottom: 40px; }\n.hero-eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }\n.hero-mark { display: inline-flex; align-items: center; gap: 6px; padding: 5px 9px 4px; border-radius: 3px; background: var(--grey-90); color: var(--base-00); font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; }\n.hero-mark::before { content: \"\"; width: 5px; height: 5px; border-radius: 50%; background: var(--mp-50); }\n.hero-eyebrow .sep { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--grey-55); font-weight: 500; }\n.hero h1 { font-family: var(--font-display); font-size: 46px; line-height: 1.04; letter-spacing: -0.025em; font-weight: 500; color: var(--grey-90); margin-bottom: 16px; text-wrap: balance; }\n.hero .lede { font-size: 15px; line-height: 1.55; color: var(--grey-70); max-width: 540px; }\n.hero-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; align-self: end; }\n.hero-stat { border-left: 1px solid var(--line-color); padding-left: 16px; }\n.hero-stat:first-child { border-left: 0; padding-left: 0; }\n.hero-stat .n { font-size: 34px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; color: var(--grey-90); font-variant-numeric: tabular-nums; }\n.hero-stat .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--grey-60); margin-top: 9px; font-weight: 500; }\n\n/* ===== GLANCE STRIP ====================================================== */\n.glance { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1px solid var(--line-color); border-left: 1px solid var(--line-color); margin-bottom: 48px; }\n.glance-tile { background: var(--base-00); border-right: 1px solid var(--line-color); border-bottom: 1px solid var(--line-color); padding: 18px 18px 16px; display: flex; flex-direction: column; gap: 10px; min-height: 104px; }\n.glance-tile.zero { background: var(--base-05); }\n.glance-tile .n { font-size: 30px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; color: var(--grey-90); font-variant-numeric: tabular-nums; }\n.glance-tile.zero .n { color: var(--grey-45); }\n.glance-tile .lbl { font-size: 11px; line-height: 1.3; color: var(--grey-60); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; margin-top: auto; }\n\n/* ===== SECTION / CAT HEAD ================================================ */\n.section { margin-bottom: 52px; }\n.cat-head { display: flex; align-items: baseline; gap: 14px; padding-bottom: 12px; margin-bottom: 20px; border-bottom: 1px solid var(--line-color); }\n.cat-head .num { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; color: var(--mp-50); font-variant-numeric: tabular-nums; }\n.cat-head h2 { font-size: 19px; font-weight: 500; letter-spacing: -0.005em; color: var(--grey-90); }\n.cat-head .count { margin-left: auto; font-size: 12px; color: var(--grey-55); font-variant-numeric: tabular-nums; }\n\n/* ===== STORY CARD ======================================================== */\n.story-stack { display: flex; flex-direction: column; gap: 16px; }\n.story-card { background: var(--base-00); border: 1px solid var(--line-color); border-radius: 4px; padding: 22px 24px 20px; display: flex; flex-direction: column; gap: 12px; transition: border-color 140ms ease; }\n.story-card:hover { border-color: var(--base-black); }\n.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }\n.partner-badge { flex-shrink: 0; font-family: var(--font-mono); font-size: 12px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; background: var(--base-black); color: var(--base-white); padding: 8px 14px; border-radius: 2px; white-space: nowrap; margin-top: 5px; }\n.story-meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--grey-60); }\n.story-title { font-family: var(--font-display); font-size: 23px; line-height: 1.2; font-weight: 500; letter-spacing: -0.012em; color: var(--grey-90); text-wrap: pretty; }\n.story-body { font-size: 13.5px; line-height: 1.6; color: var(--grey-70); }\n.story-foot { font-size: 12px; color: var(--grey-55); }\n.story-foot a { color: var(--grey-60); text-decoration: none; border-bottom: 1px solid var(--line-color-strong); padding-bottom: 1px; transition: color 120ms ease, border-color 120ms ease; }\n.story-foot a:hover { color: var(--mp-70); border-bottom-color: var(--mp-50); }\n\n/* ===== PER-CATEGORY COLORS (headers + story cards) ======================= */\n.cat-head h2 { padding: 6px 13px; border-radius: 5px; font-size: 16px; }\n.cat-ai     .cat-head .num { color: #2563eb; } .cat-ai     .cat-head h2 { background: #e8f0fb; color: #1e4fc4; }\n.cat-brand  .cat-head .num { color: #b07512; } .cat-brand  .cat-head h2 { background: #fdefc4; color: #8a5a0c; }\n.cat-newbiz .cat-head .num { color: #0a9d6e; } .cat-newbiz .cat-head h2 { background: #d1fae5; color: #06674a; }\n.cat-pitch  .cat-head .num { color: #6d28d9; } .cat-pitch  .cat-head h2 { background: #ede9fe; color: #4c1d95; }\n.cat-people .cat-head .num { color: #be185d; } .cat-people .cat-head h2 { background: #fce7f3; color: #9d1750; }\n.cat-launch .cat-head .num { color: #0d9488; } .cat-launch .cat-head h2 { background: #e6faf2; color: #0a6b56; }\n.cat-comp   .cat-head .num { color: #dc2626; } .cat-comp   .cat-head h2 { background: #fee2e2; color: #991b1b; }\n.cat-events .cat-head .num { color: #4f46e5; } .cat-events .cat-head h2 { background: #e6e6fb; color: #3730a3; }\n.cat-other  .cat-head .num { color: #4b5563; } .cat-other  .cat-head h2 { background: #eef0f3; color: #374151; }\n\n.cat-ai     .story-card { background: #f6f9fe; border-color: #dbe6fb; }\n.cat-brand  .story-card { background: #fdfbf3; border-color: #ece0c4; }\n.cat-people .story-card { background: #fdf6fa; border-color: #f3dcec; }\n.cat-launch .story-card { background: #f3fcf8; border-color: #d2ece2; }\n.cat-newbiz .story-card { background: #f4fdf8; border-color: #d0eede; }\n.cat-pitch  .story-card { background: #f9f7ff; border-color: #e5dcfb; }\n.cat-comp   .story-card { background: #fdf6f5; border-color: #f6d8d4; }\n\n/* ===== OUTREACH ACCORDION ================================================ */\ndetails.outreach { margin-top: 6px; border-top: 1px dashed var(--line-color); padding-top: 14px; }\ndetails.outreach summary { cursor: pointer; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--mp-70); list-style: none; display: flex; align-items: center; gap: 7px; user-select: none; }\ndetails.outreach summary::-webkit-details-marker { display: none; }\ndetails.outreach summary::before { content: \"\"; width: 6px; height: 6px; border-right: 1.5px solid var(--mp-50); border-bottom: 1.5px solid var(--mp-50); transform: rotate(-45deg); transition: transform 0.2s; margin-left: 2px; }\ndetails.outreach[open] summary::before { transform: rotate(45deg); }\n.outreach-body { margin-top: 16px; font-size: 13px; line-height: 1.6; }\n.outreach-body h4 { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--grey-55); margin-top: 18px; margin-bottom: 8px; }\n.outreach-body h4:first-child { margin-top: 0; }\n.outreach-body ul { padding-left: 16px; }\n.outreach-body ul li { margin-bottom: 3px; color: var(--grey-70); }\n.outreach-body ul li strong { font-weight: 500; color: var(--grey-90); }\n.event-signal { background: var(--mp-10); border-left: 2px solid var(--mp-50); border-radius: 0 3px 3px 0; padding: 10px 14px; font-size: 12.5px; color: var(--mp-80); margin: 4px 0; line-height: 1.5; }\n.use-cases { background: var(--base-05); border: 1px solid var(--line-color); border-radius: 3px; padding: 10px 14px; margin: 4px 0; }\n.use-cases ul { margin: 0; }\n.draft-block { background: var(--base-05); border: 1px solid var(--line-color); border-left: 2px solid var(--grey-90); border-radius: 0 3px 3px 0; padding: 14px 18px; margin-top: 8px; }\n.opening-line { font-size: 12.5px; font-style: italic; color: var(--mp-80); margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed var(--line-color); }\n.draft-message { font-size: 13px; line-height: 1.65; color: var(--grey-80); white-space: pre-wrap; }\n\n/* ===== EMPTY NOTE ======================================================== */\n.empty-note { background: var(--base-00); border: 1px solid var(--line-color); border-left: 2px solid var(--success-green-60); padding: 18px 22px; font-size: 13px; line-height: 1.55; color: var(--grey-70); display: flex; gap: 12px; align-items: flex-start; }\n.empty-note .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; color: var(--success-green-60); flex: 0 0 auto; padding-top: 2px; }\n\n/* ===== EVENTS LIST ======================================================= */\n.events-list { background: var(--base-00); border: 1px solid var(--line-color); }\n.event-row { display: grid; grid-template-columns: 180px 150px 1fr auto; gap: 18px; align-items: baseline; padding: 14px 20px; border-bottom: 1px solid var(--line-color); font-size: 13px; }\n.event-row:last-child { border-bottom: 0; }\n.event-row:hover { background: var(--base-05); }\n.event-person { font-weight: 500; color: var(--grey-90); }\n.event-agency { color: var(--grey-60); font-size: 12px; }\n.event-detail { color: var(--grey-75); color: var(--grey-70); line-height: 1.5; }\n.event-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; white-space: nowrap; text-align: right; }\n.event-date { color: var(--grey-55); font-size: 12px; font-variant-numeric: tabular-nums; white-space: nowrap; }\n.event-source a { font-size: 11px; color: var(--grey-60); text-decoration: none; border-bottom: 1px solid var(--line-color-strong); transition: color 120ms ease, border-color 120ms ease; }\n.event-source a:hover { color: var(--mp-70); border-bottom-color: var(--mp-50); }\n\n/* ===== OTHER ACTIVITY ==================================================== */\n.other-list { border-top: 1px solid var(--line-color); }\n.other-row { display: grid; grid-template-columns: 190px 1fr; gap: 18px; align-items: baseline; padding: 16px 4px; border-bottom: 1px solid var(--line-color); }\n.other-row .who { font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--mp-70); }\n.other-row .what { font-size: 13px; line-height: 1.55; color: var(--grey-70); }\n.other-row .what a { color: var(--grey-60); text-decoration: none; border-bottom: 1px solid var(--line-color-strong); transition: color 120ms ease, border-color 120ms ease; }\n.other-row .what a:hover { color: var(--mp-70); border-bottom-color: var(--mp-50); }\n\n/* ===== APPENDIX ========================================================== */\n.appendix-intro { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--grey-60); font-weight: 500; margin-bottom: 16px; }\n.appendix { border: 1px solid var(--line-color); background: var(--base-00); }\n.appendix-row { display: grid; grid-template-columns: 230px 150px 1fr; gap: 0; border-bottom: 1px solid var(--line-color); align-items: center; }\n.appendix-row:last-child { border-bottom: 0; }\n.appendix-row.head { background: var(--base-05); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; color: var(--grey-60); }\n.appendix-row.head > div { padding: 11px 18px; }\n.appendix-row.none-row { background: var(--base-05); }\n.appendix-row > div { padding: 13px 18px; }\n.appendix-row .p { font-size: 14px; font-weight: 500; color: var(--grey-90); }\n.appendix-row.none-row .p { color: var(--grey-60); font-weight: 400; }\n.appendix-row .note { font-size: 12px; line-height: 1.45; color: var(--grey-65); }\n.st-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; padding: 3px 8px; border-radius: 3px; width: fit-content; }\n.st-badge::before { content: \"\"; width: 5px; height: 5px; border-radius: 50%; }\n.st-badge.featured { background: var(--mp-15); color: var(--mp-70); }\n.st-badge.featured::before { background: var(--mp-50); }\n.st-badge.other { background: var(--yellow-20); color: var(--yellow-80); }\n.st-badge.other::before { background: var(--yellow-60); }\n.st-badge.none { background: var(--base-20); color: var(--grey-55); }\n.st-badge.none::before { background: var(--grey-45); }\n\n/* ===== FOOTER ============================================================ */\n.foot { margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--line-color); display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--grey-60); letter-spacing: 0.02em; flex-wrap: wrap; gap: 12px; }\n.foot .arrow { font-weight: 500; color: var(--grey-80); }\n\n@media (max-width: 820px) {\n  .page { padding: 22px 20px 60px; }\n  .hero { grid-template-columns: 1fr; gap: 28px; }\n  .hero h1 { font-size: 30px; }\n  .glance { grid-template-columns: repeat(2, 1fr); }\n  .event-row { grid-template-columns: 1fr; gap: 4px; }\n  .event-meta { align-items: flex-start; text-align: left; flex-direction: row; gap: 10px; }\n  .other-row, .appendix-row { grid-template-columns: 1fr; gap: 4px; }\n  .appendix-row.head { display: none; }\n  .topbar .meta { display: none; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"page\">\n\n<!-- TOPBAR -->\n<div class=\"topbar\">\n  <div class=\"brand\">\n    <svg class=\"mark\" width=\"40\" height=\"22\" viewBox=\"0 0 56 28\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\">\n      <circle cx=\"10\" cy=\"9\" r=\"8\" fill=\"none\" stroke=\"#111110\" stroke-width=\"2\"><\u002Fcircle>\n      <circle cx=\"34\" cy=\"9\" r=\"8\" fill=\"none\" stroke=\"#111110\" stroke-width=\"2\"><\u002Fcircle>\n      <line x1=\"16\" y1=\"11\" x2=\"28\" y2=\"11\" stroke=\"#111110\" stroke-width=\"2\"><\u002Fline>\n      <circle cx=\"22\" cy=\"24\" r=\"4\" fill=\"#B60AE3\"><\u002Fcircle>\n    <\u002Fsvg>\n    <span class=\"wordmark\">Frontify<\u002Fspan>\n    <span class=\"div\"><\u002Fspan>\n    <span class=\"ci\">Agency Partner Watch<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"meta\">\n    <span>Weekly Intelligence Briefing<\u002Fspan>\n    <span><b>28 May – 4 Jun 2026<\u002Fb><\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- HERO -->\n<div class=\"hero\">\n  <div>\n    <div class=\"hero-eyebrow\">\n      <span class=\"hero-mark\">Partner Intel<\u002Fspan>\n      <span class=\"sep\">Report 22<\u002Fspan>\n    <\u002Fdiv>\n    <h1>Frontify Partner Agency Watch<\u002Fh1>\n    <p class=\"lede\">A seven-day scan across 26 strategic agency partners — brand work, AI positioning, senior moves, new capabilities, and stage appearances — with suggested outreach attached to every signal.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"hero-stats\">\n    <div class=\"hero-stat\"><div class=\"n\">26<\u002Fdiv><div class=\"lbl\">Partners tracked<\u002Fdiv><\u002Fdiv>\n    <div class=\"hero-stat\"><div class=\"n\">10<\u002Fdiv><div class=\"lbl\">Featured stories<\u002Fdiv><\u002Fdiv>\n    <div class=\"hero-stat\"><div class=\"n\">11<\u002Fdiv><div class=\"lbl\">Event appearances<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- GLANCE STRIP -->\n<div class=\"glance\">\n  <div class=\"glance-tile\"><div class=\"n\">2<\u002Fdiv><div class=\"lbl\">AI &amp; Brand Intelligence<\u002Fdiv><\u002Fdiv>\n  <div class=\"glance-tile\"><div class=\"n\">4<\u002Fdiv><div class=\"lbl\">Brand &amp; Identity Work<\u002Fdiv><\u002Fdiv>\n  <div class=\"glance-tile zero\"><div class=\"n\">0<\u002Fdiv><div class=\"lbl\">New Business<\u002Fdiv><\u002Fdiv>\n  <div class=\"glance-tile zero\"><div class=\"n\">0<\u002Fdiv><div class=\"lbl\">Pitches<\u002Fdiv><\u002Fdiv>\n  <div class=\"glance-tile\"><div class=\"n\">3<\u002Fdiv><div class=\"lbl\">People &amp; Hires<\u002Fdiv><\u002Fdiv>\n  <div class=\"glance-tile\"><div class=\"n\">1<\u002Fdiv><div class=\"lbl\">Launches &amp; Capabilities<\u002Fdiv><\u002Fdiv>\n  <div class=\"glance-tile zero\"><div class=\"n\">0<\u002Fdiv><div class=\"lbl\">Competitor Watch<\u002Fdiv><\u002Fdiv>\n  <div class=\"glance-tile\"><div class=\"n\">11<\u002Fdiv><div class=\"lbl\">Events &amp; Attendance<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ═══ 01 · AI & BRAND INTELLIGENCE ═══ -->\n<div class=\"section cat-ai\">\n  <div class=\"cat-head\">\n    <span class=\"num\">01<\u002Fspan>\n    <h2>AI &amp; Brand Intelligence<\u002Fh2>\n    <span class=\"count\">2 stories<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"story-stack\">\n\n    <div class=\"story-card\">\n      <div class=\"card-header\">\n        <div class=\"story-title\">R/GA's global CEO and CSO put brands-as-intelligent-systems on the SXSW London main stage<\u002Fdiv>\n        <span class=\"partner-badge\">R/GA<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"story-meta\">3 June 2026<\u002Fdiv>\n      <p class=\"story-body\">Robin Forbes (Global CEO) and Melissa Jackson Parsey (Global Chief Strategy Officer) headlined a SXSW London keynote titled \"Can Brands Think for Themselves?\" — exploring how to build brand as an intelligent system that creates relevance, value, and growth as AI reshapes how people discover, decide, and engage. The session was held at Shoreditch Town Hall on June 3.<\u002Fp>\n      <div class=\"story-foot\">Source: <a href=\"https://www.linkedin.com/company/r-ga/posts/?feedView=all\" target=\"_blank\">R/GA LinkedIn<\u002Fa><\u002Fdiv>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <h4>Named Contacts<\u002Fh4>\n          <ul>\n            <li>Robin Forbes — Global CEO, R/GA<\u002Fli>\n            <li>Melissa Jackson Parsey — Global Chief Strategy Officer, R/GA<\u002Fli>\n          <\u002Ful>\n          <h4>Event Signal<\u002Fh4>\n          <div class=\"event-signal\">Robin Forbes and Melissa Jackson Parsey speaking at SXSW London, \"Can Brands Think for Themselves?\", 3 June 2026.<\u002Fdiv>\n          <h4>Frontify Use Cases<\u002Fh4>\n          <div class=\"use-cases\"><ul>\n            <li><strong>AI brand<\u002Fstrong> — brand brain / machine-readable brand; R/GA's framing of brand as an intelligent system maps directly onto Frontify's work making brand guidelines queryable by AI agents.<\u002Fli>\n          <\u002Ful><\u002Fdiv>\n          <h4>Suggested Message (LinkedIn → Robin Forbes)<\u002Fh4>\n          <div class=\"draft-block\">\n            <div class=\"opening-line\">Opening: \"Your SXSW talk landed at the right moment\"<\u002Fdiv>\n            <div class=\"draft-message\">Hi Robin,\n\nYour SXSW session on brands as intelligent systems sparked a lot of conversation this week — the framing resonated with work we're doing at Frontify around machine-readable brand guidelines and how AI tools consume brand identity at runtime.\n\nThe question of whether a brand can \"think for itself\" is one we're working on from the infrastructure side: making the brand guidelines queryable, not just readable.\n\nWould love to share what we're building and hear what you're seeing from clients trying to navigate this. Happy to send a short note if it's useful.\n\n[Your name]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"story-card\">\n      <div class=\"card-header\">\n        <div class=\"story-title\">Landor's global CCO frames the future of brand as \"AI-amplified living systems\"<\u002Fdiv>\n        <span class=\"partner-badge\">Landor<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"story-meta\">2 June 2026<\u002Fdiv>\n      <p class=\"story-body\">Ahead of Cannes Lions, Teemu Suviala (Global Chief Creative Officer, Landor) articulated a shift in how brands should be built: away from static campaigns and toward \"original, AI-amplified living systems\" designed to move across platforms, audiences, experiences, and time. The piece appeared in Creativebrief's Cannes 2026 trends roundup alongside perspectives from other industry leaders.<\u002Fp>\n      <div class=\"story-foot\">Source: <a href=\"https://www.creativebrief.com/bite/thought-leadership/what-will-be-the-key-trends-at-cannes-2026\" target=\"_blank\">Creativebrief, 2 June 2026<\u002Fa><\u002Fdiv>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <h4>Named Contacts<\u002Fh4>\n          <ul>\n            <li>Teemu Suviala — Global Chief Creative Officer, Landor<\u002Fli>\n          <\u002Ful>\n          <h4>Frontify Use Cases<\u002Fh4>\n          <div class=\"use-cases\"><ul>\n            <li><strong>AI brand<\u002Fstrong> — Suviala's \"AI-amplified living systems\" framing aligns directly with Frontify's brand brain work: a queryable, machine-readable brand that AI tools can consume to stay consistent at scale.<\u002Fli>\n          <\u002Ful><\u002Fdiv>\n          <h4>Suggested Message (LinkedIn → Teemu Suviala)<\u002Fh4>\n          <div class=\"draft-block\">\n            <div class=\"opening-line\">Opening: \"Your Creativebrief piece on living brand systems\"<\u002Fdiv>\n            <div class=\"draft-message\">Hi Teemu,\n\nYour framing in Creativebrief — brands as AI-amplified living systems, not static campaigns — is one of the cleaner articulations of where this is heading that I've read recently.\n\nAt Frontify, we're building toward the same idea from the infrastructure side: making brand guidelines machine-readable so AI tools can query them at runtime rather than hoping humans interpret a PDF correctly. It's a topic we spend a lot of time on.\n\nWould be happy to share what we're working on if it's useful context for work you're doing with clients. Worth a conversation?\n\n[Your name]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ═══ 02 · BRAND & IDENTITY WORK ═══ -->\n<div class=\"section cat-brand\">\n  <div class=\"cat-head\">\n    <span class=\"num\">02<\u002Fspan>\n    <h2>Brand &amp; Identity Work<\u002Fh2>\n    <span class=\"count\">4 stories<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"story-stack\">\n\n    <div class=\"story-card\">\n      <div class=\"card-header\">\n        <div class=\"story-title\">JKR delivers Schweppes' biggest brand overhaul in generations with \"With Time Comes Taste\"<\u002Fdiv>\n        <span class=\"partner-badge\">JKR (Jones Knowles Ritchie)<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"story-meta\">2 June 2026<\u002Fdiv>\n      <p class=\"story-body\">Jones Knowles Ritchie (with Studio.One and Mischief) unveiled a sweeping brand refresh for Schweppes — the world's first soda, founded in 1783. The new platform, \"With Time Comes Taste,\" draws on 243 years of heritage: a bold saffron-yellow palette, an updated wordmark inspired by 18th-century serif lettering, and a fountain symbol referencing the brand's appearance at the Great Exhibition of 1851. Clive the Leopard, the brand mascot first introduced in 1999, returns for summer activations including a Piccadilly Circus debut. Packaging has begun rolling out in the UK and South Africa, with Latin America, Eastern Europe, and Asia to follow through 2026.<\u002Fp>\n      <div class=\"story-foot\">Source: <a href=\"https://www.creativeboom.com/news/with-time-comes-taste-schweppes-reimagines-the-brand-it-invented/\" target=\"_blank\">Creative Boom, 2 June 2026<\u002Fa><\u002Fdiv>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <h4>Named Contacts<\u002Fh4>\n          <ul>\n            <li>No named JKR contacts in source.<\u002Fli>\n          <\u002Ful>\n          <h4>Frontify Use Cases<\u002Fh4>\n          <div class=\"use-cases\"><ul>\n            <li><strong>Brand portal<\u002Fstrong> — a global identity rolling out across six+ markets needs a central home for standards; Frontify keeps the new Schweppes codes consistent from UK launch through LATAM and APAC.<\u002Fli>\n            <li><strong>DAM<\u002Fstrong> — managing Clive, the fountain illustration, and saffron-palette assets across packaging, outdoor, and experiences at global scale.<\u002Fli>\n          <\u002Ful><\u002Fdiv>\n          <h4>Suggested Message (LinkedIn → JKR team)<\u002Fh4>\n          <div class=\"draft-block\">\n            <div class=\"opening-line\">Opening: \"The Schweppes work has been getting deserved attention\"<\u002Fdiv>\n            <div class=\"draft-message\">Hi [JKR contact],\n\nThe Schweppes refresh has been getting well-deserved attention this week — the archive-led approach and \"With Time Comes Taste\" platform are a strong combination for a brand with that much heritage equity.\n\nWith a rollout spanning six markets through 2026, the governance side of a project like this becomes as interesting as the creative. We work with brands like Lufthansa and Volkswagen Group on keeping identity systems consistent at global scale — it's a conversation that might be worth having, either now or when Schweppes heads into the next market phase.\n\nHappy to share how others have handled it if useful.\n\n[Your name]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"story-card\">\n      <div class=\"card-header\">\n        <div class=\"story-title\">Interbrand creates the name and brand identity for ARCHION, the four-company commercial vehicle alliance<\u002Fdiv>\n        <span class=\"partner-badge\">Interbrand<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"story-meta\">29 May 2026<\u002Fdiv>\n      <p class=\"story-body\">Interbrand supported the development of the brand identity for ARCHION株式会社 — a new holding company formed by Hino Motors and Mitsubishi Fuso Truck and Bus Corporation, backed by Toyota Motor Corporation and Daimler Truck AG. The work covers naming and logo creation, with the Interbrand team working closely across four global companies and cultures to produce a unified identity representing progress, connection, and collective strength for the next era of commercial mobility.<\u002Fp>\n      <div class=\"story-foot\">Source: <a href=\"https://www.linkedin.com/company/interbrand/posts/?feedView=all\" target=\"_blank\">Interbrand LinkedIn, 29 May 2026<\u002Fa><\u002Fdiv>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <h4>Named Contacts<\u002Fh4>\n          <ul>\n            <li>No named Interbrand contacts in source.<\u002Fli>\n          <\u002Ful>\n          <h4>Frontify Use Cases<\u002Fh4>\n          <div class=\"use-cases\"><ul>\n            <li><strong>Brand portal<\u002Fstrong> — a new holding brand spanning four legacy organisations and multiple geographies needs a single, authoritative source of truth for identity standards from day one.<\u002Fli>\n            <li><strong>Design system<\u002Fstrong> — reusable brand components shared across Hino, Fuso, Toyota, and Daimler Truck brand touchpoints within the ARCHION structure.<\u002Fli>\n          <\u002Ful><\u002Fdiv>\n          <h4>Suggested Message (LinkedIn → Interbrand Partnerships)<\u002Fh4>\n          <div class=\"draft-block\">\n            <div class=\"opening-line\">Opening: \"The ARCHION project is an interesting one to follow\"<\u002Fdiv>\n            <div class=\"draft-message\">Hi [Interbrand contact],\n\nThe ARCHION work caught our eye — building a new brand identity for a four-company alliance across Toyota, Daimler Truck, Hino, and Fuso is exactly the kind of project where getting the post-launch governance right matters as much as the creative.\n\nWe work with brands in similar situations — multi-company structures that need a single source of truth for identity standards — and it's a conversation that often starts the moment the rebrand launches. Would be happy to share what that looks like in practice if it's useful context.\n\n[Your name]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"story-card\">\n      <div class=\"card-header\">\n        <div class=\"story-title\">Dragon Rouge refreshes Oro Saiwa packaging for the Italian biscuit's 70th anniversary<\u002Fdiv>\n        <span class=\"partner-badge\">Dragon Rouge<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"story-meta\">29 May 2026<\u002Fdiv>\n      <p class=\"story-body\">Dragon Rouge redesigned the packaging identity for Oro Saiwa — a Mondelez-owned Italian biscuit brand present on Italian breakfast tables since 1956. The brief was to strengthen shelf presence and brand desirability for the 70th anniversary while preserving the iconic yellow pack and heritage codes. Dragon Rouge's response: \"back to essentials\" — clarifying the brand's codes, strengthening its presence, and revealing what makes it distinctive. The post attracted over 1,700 reactions and 44 reposts on LinkedIn.<\u002Fp>\n      <div class=\"story-foot\">Source: <a href=\"https://www.linkedin.com/company/dragon-rouge/posts/?feedView=all\" target=\"_blank\">Dragon Rouge LinkedIn, 29 May 2026<\u002Fa><\u002Fdiv>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <h4>Named Contacts<\u002Fh4>\n          <ul>\n            <li>Florence West — title not stated<\u002Fli>\n            <li>Laura Oppici — title not stated<\u002Fli>\n            <li>Matthieu Bourlon — title not stated<\u002Fli>\n            <li>Elvire Graff — title not stated<\u002Fli>\n            <li>Jérôme Héulot — title not stated<\u002Fli>\n            <li>Aziliz Hideux Bordes — title not stated<\u002Fli>\n            <li>Marielle Torres — title not stated<\u002Fli>\n            <li>Romain Araud — title not stated<\u002Fli>\n          <\u002Ful>\n          <h4>Frontify Use Cases<\u002Fh4>\n          <div class=\"use-cases\"><ul>\n            <li><strong>Brand portal<\u002Fstrong> — centralising the refreshed pack codes, colour standards, and heritage visual assets for a brand sold across multiple European markets.<\u002Fli>\n            <li><strong>DAM<\u002Fstrong> — managing Mondelez packaging assets across FMCG production chains at scale.<\u002Fli>\n          <\u002Ful><\u002Fdiv>\n          <h4>Suggested Message (LinkedIn → Florence West or Jérôme Héulot)<\u002Fh4>\n          <div class=\"draft-block\">\n            <div class=\"opening-line\">Opening: \"The Oro Saiwa project has been making the rounds\"<\u002Fdiv>\n            <div class=\"draft-message\">Hi [Name],\n\nThe Oro Saiwa refresh has been making the rounds in the design community this week — great to see a heritage-led brief handled with that much care and restraint.\n\nFor FMCG packaging work at that scale, the post-delivery governance side often comes up — how the updated codes get maintained consistently as the brand rolls across different markets and production partners. It's a problem we spend a lot of time on at Frontify, working with brands like Volkswagen Group and Roche.\n\nHappy to share how others have approached it if it's useful context. No agenda, just a topic we both seem to work on.\n\n[Your name]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"story-card\">\n      <div class=\"card-header\">\n        <div class=\"story-title\">Mother Design repositions Scribd as \"Life's Bibliographer\" with a brand system built for depth and discovery<\u002Fdiv>\n        <span class=\"partner-badge\">Mother Design<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"story-meta\">28 May 2026<\u002Fdiv>\n      <p class=\"story-body\">Mother Design repositioned Scribd — a platform for deep reading and discovery — with a new brand identity built around the idea of \"Life's Bibliographer\": a brand for people who want to go deeper, find the source, and draw their own conclusions. The transformation spans tone of voice, visual language, and a system drawing on the world of archives, references, and research. The work was recognised with a D&amp;AD Wood Pencil in the Writing for Design category.<\u002Fp>\n      <div class=\"story-foot\">Source: <a href=\"https://www.linkedin.com/company/mother-design/posts/?feedView=all\" target=\"_blank\">Mother Design LinkedIn, 28 May 2026<\u002Fa><\u002Fdiv>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <h4>Named Contacts<\u002Fh4>\n          <ul>\n            <li>Kirsty Minns — title not stated<\u002Fli>\n            <li>Annabel Engels — title not stated<\u002Fli>\n            <li>Kathryn Jubrail — title not stated<\u002Fli>\n            <li>Joanna Tulej — title not stated<\u002Fli>\n          <\u002Ful>\n          <h4>Frontify Use Cases<\u002Fh4>\n          <div class=\"use-cases\"><ul>\n            <li><strong>Brand portal<\u002Fstrong> — housing the Scribd brand system where tone of voice, visual identity, and archive-inspired design principles live together as one authoritative source.<\u002Fli>\n            <li><strong>Design system<\u002Fstrong> — reusable design components for the archive-and-research-inspired identity applied across Scribd's product and communications.<\u002Fli>\n          <\u002Ful><\u002Fdiv>\n          <h4>Suggested Message (LinkedIn → Kirsty Minns)<\u002Fh4>\n          <div class=\"draft-block\">\n            <div class=\"opening-line\">Opening: \"The Scribd 'Life's Bibliographer' work is beautifully conceived\"<\u002Fdiv>\n            <div class=\"draft-message\">Hi Kirsty,\n\nThe Scribd \"Life's Bibliographer\" work is beautifully conceived — the idea of a brand built for going deeper rather than faster feels genuinely countercultural right now, and the archive-inspired system makes it feel grounded.\n\nProjects that bring TOV and visual identity together as one coherent system are exactly the kind of work where the platform the brand lives on matters. We work with brands like McKinsey and OpenAI on making that kind of integrated brand system accessible and maintainable — it's a space we both seem to care about.\n\nWorth a quick conversation? Happy to keep it short.\n\n[Your name]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ═══ 03 · NEW BUSINESS ═══ -->\n<div class=\"section cat-newbiz\">\n  <div class=\"cat-head\">\n    <span class=\"num\">03<\u002Fspan>\n    <h2>New Business<\u002Fh2>\n    <span class=\"count\">0 stories<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"empty-note\"><span class=\"lbl\">Clear<\u002Fspan><span>No qualifying new business wins from the past seven days.<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ═══ 04 · PITCHES ═══ -->\n<div class=\"section cat-pitch\">\n  <div class=\"cat-head\">\n    <span class=\"num\">04<\u002Fspan>\n    <h2>Pitches<\u002Fh2>\n    <span class=\"count\">0 stories<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"empty-note\"><span class=\"lbl\">Clear<\u002Fspan><span>No qualifying pitch activity from the past seven days. (DWP £18m review — M+C Saatchi UK incumbent — was covered in the previous run.)<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ═══ 05 · PEOPLE & HIRES ═══ -->\n<div class=\"section cat-people\">\n  <div class=\"cat-head\">\n    <span class=\"num\">05<\u002Fspan>\n    <h2>People &amp; Hires<\u002Fh2>\n    <span class=\"count\">3 stories<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"story-stack\">\n\n    <div class=\"story-card\">\n      <div class=\"card-header\">\n        <div class=\"story-title\">Yong Yuan elevated to CEO of The Ogilvy Group China<\u002Fdiv>\n        <span class=\"partner-badge\">Ogilvy<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"story-meta\">3 June 2026<\u002Fdiv>\n      <p class=\"story-body\">Yong Yuan, previously President of Ogilvy Advertising China, has been promoted to Chief Executive Officer of The Ogilvy Group China, effective immediately. In the new role he will oversee operations across advertising, digital experience, social, influence, and public relations, and lead closer collaboration between Ogilvy and Grey across China. He joined Ogilvy in 2011 and holds an MBA from Harvard Business School. He reports to Chris Reitermann, CEO of WPP Greater China.<\u002Fp>\n      <div class=\"story-foot\">Source: <a href=\"https://marketech-apac.com/yong-yuan-takes-helm-as-ceo-of-ogilvy-group-china/\" target=\"_blank\">Marketech APAC, 3 June 2026<\u002Fa><\u002Fdiv>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <h4>Named Contacts<\u002Fh4>\n          <ul>\n            <li>Yong Yuan — CEO, The Ogilvy Group China (previously President, Ogilvy Advertising China)<\u002Fli>\n          <\u002Ful>\n          <h4>Suggested Message (LinkedIn → Yong Yuan)<\u002Fh4>\n          <div class=\"draft-block\">\n            <div class=\"opening-line\">Opening: \"Congratulations on the Ogilvy Group China role\"<\u002Fdiv>\n            <div class=\"draft-message\">Hi Yong,\n\nCongratulations on the expanded role — leading The Ogilvy Group China across advertising, digital experience, and social is a significant remit, and I've followed the work the China team has been doing closely.\n\nI lead partnerships at Frontify. We work with a number of WPP teams globally and are particularly active with agencies navigating how to maintain brand consistency across multi-market production at scale — a topic that tends to come up quickly once a client roster grows across borders.\n\nNo hard pitch — just wanted to say congratulations and introduce myself in case the conversation is ever relevant.\n\n[Your name]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"story-card\">\n      <div class=\"card-header\">\n        <div class=\"story-title\">Landor appoints Alana Eversole as Global EVP Experience and promotes Ryan Frost to Global ECD<\u002Fdiv>\n        <span class=\"partner-badge\">Landor<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"story-meta\">3 June 2026<\u002Fdiv>\n      <p class=\"story-body\">Landor has appointed Alana Eversole as Global EVP, Experience — a newly created role — and promoted Ryan Frost to Global Executive Creative Director. Eversole returns to Landor from Jones Knowles Ritchie, where she served as Executive Business Director, bringing more than 20 years in brand experience and business development. The double appointment signals Landor's continued investment in design and experience capabilities as it positions for \"an increasingly agentic world.\"<\u002Fp>\n      <div class=\"story-foot\">Source: <a href=\"https://roastbrief.us/landor-expands-global-leadership-as-it-accelerates-its-experience-and-creative-growth/\" target=\"_blank\">Roastbrief US, 3 June 2026<\u002Fa><\u002Fdiv>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <h4>Named Contacts<\u002Fh4>\n          <ul>\n            <li>Alana Eversole — Global EVP, Experience, Landor (previously Executive Business Director, JKR)<\u002Fli>\n            <li>Ryan Frost — Global Executive Creative Director, Landor (promoted)<\u002Fli>\n          <\u002Ful>\n          <h4>Suggested Message (LinkedIn → Alana Eversole)<\u002Fh4>\n          <div class=\"draft-block\">\n            <div class=\"opening-line\">Opening: \"Congratulations on the return to Landor\"<\u002Fdiv>\n            <div class=\"draft-message\">Hi Alana,\n\nCongratulations on the return to Landor and the new role — Global EVP Experience is a significant mandate, particularly as the agency doubles down on experience capabilities in an agentic world.\n\nI work on partnerships at Frontify. We work with Landor's teams across several client engagements and would love to reconnect now you're back in a global remit. The experience side of brand — how brand systems extend across digital products and touchpoints — is an area where I think there's a natural conversation to be had.\n\nHappy to reconnect whenever the timing is right.\n\n[Your name]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"story-card\">\n      <div class=\"card-header\">\n        <div class=\"story-title\">Saffron appoints Andreas B. Wilhelm as Managing Director for German-speaking markets<\u002Fdiv>\n        <span class=\"partner-badge\">Saffron Brand Consultants<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"story-meta\">29 May 2026<\u002Fdiv>\n      <p class=\"story-body\">Andreas B. Wilhelm has joined Saffron Brand Consultants as Managing Director, contributing to the firm's international work and strengthening its presence in German-speaking markets (Germany, Austria, Switzerland). Wilhelm brings extensive experience in brand strategy, identity, and design for organisations navigating transformation — from start-ups to global institutions. He will continue a parallel engagement with his consultancy, Substance Identity.<\u002Fp>\n      <div class=\"story-foot\">Source: <a href=\"https://www.linkedin.com/company/saffron-brand-consultants/posts/?feedView=all\" target=\"_blank\">Saffron Brand Consultants LinkedIn, 29 May 2026<\u002Fa><\u002Fdiv>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <h4>Named Contacts<\u002Fh4>\n          <ul>\n            <li>Andreas B. Wilhelm — Managing Director, Saffron Brand Consultants (Germany, Austria, Switzerland)<\u002Fli>\n          <\u002Ful>\n          <h4>Suggested Message (LinkedIn → Andreas B. Wilhelm)<\u002Fh4>\n          <div class=\"draft-block\">\n            <div class=\"opening-line\">Opening: \"Congratulations on the Saffron role\"<\u002Fdiv>\n            <div class=\"draft-message\">Hi Andreas,\n\nCongratulations on the Saffron role — building out the German-speaking market presence for an international brand consultancy is an interesting remit, especially at a time when clients are rethinking how they govern brand across transformation projects.\n\nI work on partnerships at Frontify, headquartered in St. Gallen — so the DACH market is close to home for us, and we work with a number of Swiss and German enterprise brands on brand management and governance. Would love to connect and compare notes on what you're seeing from clients in the region.\n\n[Your name]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ═══ 06 · LAUNCHES & CAPABILITIES ═══ -->\n<div class=\"section cat-launch\">\n  <div class=\"cat-head\">\n    <span class=\"num\">06<\u002Fspan>\n    <h2>Launches &amp; Capabilities<\u002Fh2>\n    <span class=\"count\">1 story<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"story-stack\">\n\n    <div class=\"story-card\">\n      <div class=\"card-header\">\n        <div class=\"story-title\">M+C Saatchi North America triples production revenue as it scales MAKE+, its AI-enabled production offering<\u002Fdiv>\n        <span class=\"partner-badge\">M+C Saatchi<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"story-meta\">1 June 2026<\u002Fdiv>\n      <p class=\"story-body\">M+C Saatchi North America has expanded MAKE+ — its globally connected, AI-enabled production offering — following a year in which production revenue more than tripled, with a further 30% growth projected for 2026. Christopher McLallen has been elevated to lead integrated production across North America; John Swartz moves to Global Head of Production, scaling MAKE+ internationally. Recent work includes an AI-driven production system for L'Oréal generating localised content across multiple markets, end-to-end global production for Elizabeth Arden, and a centralised AI-enhanced framework for JPMorganChase spanning nine international markets.<\u002Fp>\n      <div class=\"story-foot\">Source: <a href=\"https://lbbonline.com/news/MC-Saatchi-North-America-MAKE-Plus\" target=\"_blank\">LBBOnline, 1 June 2026<\u002Fa><\u002Fdiv>\n      <details class=\"outreach\">\n        <summary>Suggested Outreach<\u002Fsummary>\n        <div class=\"outreach-body\">\n          <h4>Named Contacts<\u002Fh4>\n          <ul>\n            <li>Christopher McLallen — head of integrated production, North America, M+C Saatchi<\u002Fli>\n            <li>John Swartz — Global Head of Production, M+C Saatchi<\u002Fli>\n            <li>Nadja Bellan-White — CEO, North America, M+C Saatchi Group<\u002Fli>\n            <li>Stevie Archer — Regional Chief Creative Officer, M+C Saatchi North America<\u002Fli>\n          <\u002Ful>\n          <h4>Frontify Use Cases<\u002Fh4>\n          <div class=\"use-cases\"><ul>\n            <li><strong>Campaign toolkit<\u002Fstrong> — MAKE+'s AI production model at scale maps directly onto Frontify Templates / Creator: branded content production across markets with built-in brand consistency.<\u002Fli>\n            <li><strong>DAM<\u002Fstrong> — centralised asset management for multi-market production output across JPMorganChase, L'Oréal, Elizabeth Arden, and others.<\u002Fli>\n          <\u002Ful><\u002Fdiv>\n          <h4>Suggested Message (LinkedIn → John Swartz)<\u002Fh4>\n          <div class=\"draft-block\">\n            <div class=\"opening-line\">Opening: \"MAKE+ is clearly at an inflection point\"<\u002Fdiv>\n            <div class=\"draft-message\">Hi John,\n\nCongratulations on the Global Head of Production role — MAKE+ is clearly at an inflection point, and the L'Oréal and JPMorganChase work at multi-market scale are exactly the kinds of mandates that raise interesting questions about how you keep the brand consistent when AI is generating content across nine markets simultaneously.\n\nThat tension — speed and scale without brand drift — is something we spend a lot of time on at Frontify. We work with some of the same clients on the brand system side. Would love to compare notes on how you're approaching it with MAKE+.\n\n[Your name]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ═══ 07 · COMPETITOR WATCH ═══ -->\n<div class=\"section cat-comp\">\n  <div class=\"cat-head\">\n    <span class=\"num\">07<\u002Fspan>\n    <h2>Competitor Watch<\u002Fh2>\n    <span class=\"count\">0 stories<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"empty-note\"><span class=\"lbl\">Clear<\u002Fspan><span>No qualifying competitor activity from the past seven days. (VIM Group / Bynder Connect London — covered in the previous run.)<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ═══ 08 · EVENTS & ATTENDANCE ═══ -->\n<div class=\"section cat-events\">\n  <div class=\"cat-head\">\n    <span class=\"num\">08<\u002Fspan>\n    <h2>Events &amp; Attendance<\u002Fh2>\n    <span class=\"count\">11 entries<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"events-list\">\n\n    <div class=\"event-row\">\n      <span class=\"event-person\">Robin Forbes<\u002Fspan>\n      <span class=\"event-agency\">R/GA<\u002Fspan>\n      <span class=\"event-detail\">SXSW London — \"Can Brands Think for Themselves?\" (speaker)<\u002Fspan>\n      <span class=\"event-meta\"><span class=\"event-date\">3 June 2026<\u002Fspan><span class=\"event-source\"><a href=\"https://www.linkedin.com/company/r-ga/posts/?feedView=all\" target=\"_blank\">Source ↗<\u002Fa><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"event-row\">\n      <span class=\"event-person\">Melissa Jackson Parsey<\u002Fspan>\n      <span class=\"event-agency\">R/GA<\u002Fspan>\n      <span class=\"event-detail\">SXSW London — \"Can Brands Think for Themselves?\" (speaker)<\u002Fspan>\n      <span class=\"event-meta\"><span class=\"event-date\">3 June 2026<\u002Fspan><span class=\"event-source\"><a href=\"https://www.linkedin.com/company/r-ga/posts/?feedView=all\" target=\"_blank\">Source ↗<\u002Fa><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"event-row\">\n      <span class=\"event-person\">Laurent Ezekiel<\u002Fspan>\n      <span class=\"event-agency\">Ogilvy<\u002Fspan>\n      <span class=\"event-detail\">SXSW London — \"Brand 2030\" (moderator), Shoreditch Town Hall<\u002Fspan>\n      <span class=\"event-meta\"><span class=\"event-date\">3 June 2026<\u002Fspan><span class=\"event-source\"><a href=\"https://www.linkedin.com/company/ogilvy/posts/?feedView=all\" target=\"_blank\">Source ↗<\u002Fa><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"event-row\">\n      <span class=\"event-person\">Sam Smith<\u002Fspan>\n      <span class=\"event-agency\">JKR<\u002Fspan>\n      <span class=\"event-detail\">SXSW London — \"Design the Experience, Score the Emotion: Multi-Sensory Brand Worlds\" (speaker, with Coca-Cola + MassiveMusic), Truman Brewery Stage 1<\u002Fspan>\n      <span class=\"event-meta\"><span class=\"event-date\">4 June 2026<\u002Fspan><span class=\"event-source\"><a href=\"https://www.linkedin.com/company/jkr/posts/?feedView=all\" target=\"_blank\">Source ↗<\u002Fa><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"event-row\">\n      <span class=\"event-person\">Chris Moody<\u002Fspan>\n      <span class=\"event-agency\">Landor<\u002Fspan>\n      <span class=\"event-detail\">SXSW London — \"Cultural Fluency: Mastering Relevance in a Dynamic World\" (fireside chat), Protein Studios Stage 2<\u002Fspan>\n      <span class=\"event-meta\"><span class=\"event-date\">4 June 2026<\u002Fspan><span class=\"event-source\"><a href=\"https://www.linkedin.com/company/landorglobal/posts/?feedView=all\" target=\"_blank\">Source ↗<\u002Fa><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"event-row\">\n      <span class=\"event-person\">Luz Erhardt<\u002Fspan>\n      <span class=\"event-agency\">Saffron Brand Consultants<\u002Fspan>\n      <span class=\"event-detail\">SXSW London (attendee)<\u002Fspan>\n      <span class=\"event-meta\"><span class=\"event-date\">4 June 2026<\u002Fspan><span class=\"event-source\"><a href=\"https://www.linkedin.com/company/saffron-brand-consultants/posts/?feedView=all\" target=\"_blank\">Source ↗<\u002Fa><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"event-row\">\n      <span class=\"event-person\">Emma Follett<\u002Fspan>\n      <span class=\"event-agency\">Design Bridge and Partners<\u002Fspan>\n      <span class=\"event-detail\">Golden Drum International Festival of Creativity — All Juries Jury &amp; Craft Jury President<\u002Fspan>\n      <span class=\"event-meta\"><span class=\"event-date\">Upcoming<\u002Fspan><span class=\"event-source\"><a href=\"https://www.linkedin.com/company/designbridgeandpartners/posts/?feedView=all\" target=\"_blank\">Source ↗<\u002Fa><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"event-row\">\n      <span class=\"event-person\">Peter Ampe<\u002Fspan>\n      <span class=\"event-agency\">AKQA Brussels<\u002Fspan>\n      <span class=\"event-detail\">Golden Drum International Festival of Creativity — All Juries Jury (jury member)<\u002Fspan>\n      <span class=\"event-meta\"><span class=\"event-date\">Upcoming<\u002Fspan><span class=\"event-source\"><a href=\"https://www.linkedin.com/search/results/content/?keywords=%22Design+Bridge+and+Partners%22&amp;datePosted=past-week\" target=\"_blank\">Source ↗<\u002Fa><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div cla
